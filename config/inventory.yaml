  - "˧"
  - "˨"
  - "˩"
  - "꜒"
  - "꜓"
  - "꜔"
  - "꜕"
  - "꜖"
diacritic_markers:
  - "◌̀"
  - "◌́"
  - "◌̂"
  - "◌̃"
  - "◌̄"
  - "◌̆"
  - "◌̈"
  - "◌̊"
  - "◌̌"
  - "◌̩"
  - "◌̯"
