language: yonghe_qiang_09
title: Yonghe Qiang Transcription Character Inventory
data_roots:
  - ~/projects/my-projects/asr-models/yonghe-qiang/data/raw/YH-758
  - ~/projects/my-projects/asr-models/yonghe-qiang/data/raw/YH-868
  - ~/projects/my-projects/asr-models/yonghe-qiang/data/raw/YH-999
report_dir: ../reports
report_name: "{language}_data_inventory.md"
transcription_globs:
  # - "*.txt"
  - "*.eaf"
example_limit: 3
context_chars: 24
